services:
  # ── Application Laravel ──
  proimmo-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: proimmo-app
    restart: unless-stopped
    volumes:
      - .:/var/www
    networks:
      - proimmo-network
    working_dir: /var/www
    depends_on:
      proimmo-db:
        condition: service_healthy
    environment:
      APP_ENV: local
      APP_DEBUG: 'true'
      APP_URL: http://localhost:8083
      # Base de données MySQL
      DB_CONNECTION: mysql
      DB_HOST: proimmo-db
      DB_PORT: '3306'
      DB_DATABASE: proimmo
      DB_USERNAME: root
      DB_PASSWORD: 'yes'
      # Session / Cache
      SESSION_DRIVER: file
      SESSION_LIFETIME: '120'
      CACHE_STORE: file
      QUEUE_CONNECTION: sync

  # ── Serveur web Nginx ──
  proimmo-web:
    image: nginx:alpine
    container_name: proimmo-web
    restart: unless-stopped
    ports:
      - "8083:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/conf.d:/etc/nginx/conf.d
    depends_on:
      - proimmo-app
    networks:
      - proimmo-network

  # ── Base de données MySQL ──
  proimmo-db:
    image: mysql:8.0
    container_name: proimmo-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: proimmo
      MYSQL_ROOT_PASSWORD: 'yes'
    volumes:
      - proimmo_dbdata:/var/lib/mysql
    networks:
      - proimmo-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pyes"]
      interval: 5s
      timeout: 5s
      retries: 10

# ── Réseau Docker ──
networks:
  proimmo-network:
    driver: bridge

# ── Volume pour persistance MySQL ──
volumes:
  proimmo_dbdata:
